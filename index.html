<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <style>

      background:#111;
      color:white;

    table{
      width:100%;
      border-collapse:collapse;

<body>

<h1>Hernán 8bp catálogo</h1>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Descripción</th>
      <th>Precio Gs</th>
      <th>Precio USD</th>
    </tr>
  </thead>
  <tbody id="tabla-productos"></tbody>
</table>

<script>
const supabase = window.supabase.createClient(
  'https://jprztekarmdexaqlxjhs.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impwcnp0ZWthcm1kZXhhcWx4amhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDkyNDAsImV4cCI6MjA5NTcyNTI0MH0.rDrmMW0pamcbdbZwkxxUcIi-sV0UQCa75IqwxqPbDz8'
);

async function cargarProductos() {
  const { data, error } = await supabase
    .from('productos')
    .select('*');

  const tabla = document.getElementById('tabla-productos');

  data.forEach(p => {
    tabla.innerHTML += `
      <tr>
        <td>${p.id_producto}</td>
        <td>${p.descripcion}</td>
        <td>${p.precio_gs}</td>
        <td>${p.precio_usd}</td>
      </tr>
    `;
  });
}

cargarProductos();
</script>

</body>
</html>
